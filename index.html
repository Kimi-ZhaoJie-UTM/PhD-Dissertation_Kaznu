<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal | BRI vs Global Gateway 制度复杂性研究</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .serif-sc { font-family: 'Noto Serif SC', serif; }
        
        #gate {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
            display: grid;
            place-items: center;
            z-index: 9999;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.5s ease;
        }
        #gate-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease-out;
            user-select: none; /* 禁止文本选择 */
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #gate-box h2 {
            margin: 0 0 8px 0;
            color: #1e3a8a;
            font-size: 28px;
            font-weight: 700;
        }
        .gate-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .gate-subtitle .cn {
            font-family: 'Noto Serif SC', serif;
            color: #94a3b8;
            font-size: 13px;
        }
        #gate-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 2px;
            user-select: text; /* 输入框内允许选择 */
            -webkit-user-select: text;
        }
        #gate-box input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        #gate-box button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            user-select: none;
        }
        #gate-box button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.4);
        }
        .gate-divider {
            margin: 28px 0;
            border-top: 1px solid #e2e8f0;
            position: relative;
        }
        .gate-divider::before {
            content: "OR | 或";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 0 12px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 500;
        }
        .gate-apply-btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: #f1f5f9;
            color: #1e3a8a;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            box-sizing: border-box;
            user-select: none;
        }
        .gate-apply-btn:hover {
            background: #e2e8f0;
        }
        .gate-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 20px;
            line-height: 1.5;
            user-select: none;
        }
        .gate-hint .cn {
            font-family: 'Noto Serif SC', serif;
        }
        .gate-icon {
            font-size: 48px;
            margin-bottom: 16px;
            user-select: none;
        }
        .gate-label {
            display: block;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            user-select: none;
        }
        .gate-label .cn {
            font-family: 'Noto Serif SC', serif;
            font-weight: 400;
            color: #94a3b8;
            margin-left: 4px;
        }
        .error-shake {
            animation: shake 0.5s;
            border-color: #dc2626 !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        #main-container {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        #main-container.active {
            display: block;
        }
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- 全局禁止右键 -->

    <!-- 密码门 -->
    <div id="gate">
        <div id="gate-box">
            <div class="gate-icon">🔐</div>
            <h2>Access Required<br><span class="serif-sc" style="font-size: 20px; color: #64748b;">需要授权访问</span></h2>
            <p class="gate-subtitle">
                Institutional Complexity Research | Private Academic Content<br>
                <span class="cn">BRI vs Global Gateway 制度复杂性研究 · 私密学术材料</span>
            </p>
            
            <label class="gate-label">
                Access Password <span class="cn">访问密码</span>
            </label>
            <input type="password" id="pwd" placeholder="Enter password | 输入密码" autocomplete="off">
            <button onclick="check()" id="submit-btn">
                Enter System | 进入系统
            </button>
            
            <div class="gate-divider"></div>
            
            <button class="gate-apply-btn" onclick="requestAccess()" id="apply-btn">
                📩 Request Access | 申请查看权限
            </button>
            
            <p class="gate-hint">
                This site contains doctoral dissertation materials.<br>
                <span class="cn">本站点包含博士论文研究材料，仅供授权学术访问</span>
            </p>
        </div>
    </div>

    <!-- 主内容区 -->
    <div id="main-container">
        <iframe id="content-frame" src="main.html" title="Research Content"></iframe>
    </div>

    <script>
        // ==================== 核心安全控制：全面禁止快捷键 ====================
        (function() {
            'use strict';
            
            const pwdInput = document.getElementById('pwd');
            const gate = document.getElementById('gate');
            
            // 禁止的按键列表
            const forbiddenKeys = [
                'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F11', 'F12',
                'Escape', 'Insert', 'Delete', 'Home', 'End', 'PageUp', 'PageDown',
                'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
                'Tab', 'CapsLock', 'NumLock', 'ScrollLock', 'Pause', 'PrintScreen',
                'ContextMenu'
            ];
            
            // 禁止的组合键检查
            function isForbiddenCombo(e) {
                // Ctrl + 任何键 (包括 C/V/X/A/S/U/P/R等)
                if (e.ctrlKey) return true;
                
                // Alt + 任何键 (包括 F4, Tab等)
                if (e.altKey) return true;
                
                // Meta键 (Mac的Command键) + 任何键
                if (e.metaKey) return true;
                
                // Shift + 功能键 (如 Shift+F5)
                if (e.shiftKey && e.key.startsWith('F')) return true;
                
                return false;
            }
            
            // 全局键盘拦截 (捕获阶段，确保最先执行)
            document.addEventListener('keydown', function(e) {
                // 如果已通过验证，不再拦截
                if (!gate || gate.style.display === 'none') {
                    return true;
                }
                
                const target = e.target;
                const isPwdInput = target === pwdInput;
                
                // 1. 首先拦截所有功能键和特定禁止键（无论在何处）
                if (forbiddenKeys.includes(e.key)) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('Blocked key:', e.key);
                    return false;
                }
                
                // 2. 拦截所有组合键 (Ctrl, Alt, Meta等)
                if (isForbiddenCombo(e)) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('Blocked combo key');
                    return false;
                }
                
                // 3. 非输入框状态下，禁止除Tab外的所有键（Tab用于可访问性导航到按钮）
                if (!isPwdInput) {
                    // 只允许Tab键用于在按钮间导航，其他全部禁止
                    if (e.key !== 'Tab') {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                    return true;
                }
                
                // 4. 在密码输入框内，只允许可打印字符和回车、退格
                if (isPwdInput) {
                    // 允许的键：回车（提交）、退格
                    if (e.key === 'Enter' || e.key === 'Backspace') {
                        return true;
                    }
                    
                    // 禁止在输入框内的方向键（防止光标移动查看已输入内容？可选，但用户要求严格）
                    // 如果用户需要严格禁止一切，只保留输入功能，可以取消下面注释：
                    /*
                    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) {
                        e.preventDefault();
                        return false;
                    }
                    */
                    
                    // 只允许可打印字符（字母、数字、符号）
                    // key.length === 1 通常表示可打印字符
                    if (e.key.length === 1) {
                        return true; // 允许输入
                    }
                    
                    // 其他所有键（如Escape, Insert等）在输入框内也禁止
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
                
            }, true); // true = 捕获阶段
            
            // 禁止拖拽（防止拖拽查看源代码或图片）
            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            }, true);
            
            // 禁止选择文本（除了在密码输入框内）
            document.addEventListener('selectstart', function(e) {
                if (e.target !== pwdInput) {
                    e.preventDefault();
                    return false;
                }
            }, true);
            
            // 禁止复制事件
            document.addEventListener('copy', function(e) {
                if (e.target !== pwdInput) {
                    e.preventDefault();
                    return false;
                }
            }, true);
            
            // 禁止剪切
            document.addEventListener('cut', function(e) {
                e.preventDefault();
                return false;
            }, true);
            
            // 禁止粘贴（防止粘贴密码？虽然这不合理，但用户要求严格禁止一切）
            // 实际上应该允许粘贴密码，所以注释掉，如需严格可取消注释
            /*
            document.addEventListener('paste', function(e) {
                e.preventDefault();
                return false;
            }, true);
            */
            
            // 处理输入框的回车事件（因为内联的onkeydown可能被拦截）
            pwdInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    check();
                }
            });
            
        })();
        
        // ==================== 业务逻辑 ====================
        
        // 密码验证 - kz2026
        const _0x6b = ["\x6b\x7a\x32\x30\x32\x36"]; // kz2026
        
        function check() {
            const input = document.getElementById('pwd');
            const gate = document.getElementById('gate');
            const mainContainer = document.getElementById('main-container');
            
            if (input.value === _0x6b[0]) {
                // 验证通过
                gate.style.opacity = '0';
                setTimeout(function() {
                    gate.style.display = 'none';
                    mainContainer.classList.add('active');
                    console.log("✓ Authorized access at: " + new Date().toLocaleString());
                }, 500);
            } else {
                // 验证失败
                input.classList.add('error-shake');
                input.value = '';
                input.placeholder = 'Incorrect password | 密码错误';
                setTimeout(() => {
                    input.classList.remove('error-shake');
                    input.placeholder = 'Enter password | 输入密码';
                }, 1000);
                input.focus();
            }
        }
        
        function requestAccess() {
            const email = prompt("Please enter your institutional email address | 请输入您的机构邮箱：");
            if (email && email.includes('@') && email.includes('.')) {
                alert("Access request sent to administrator.\nYou will receive the password via email within 1-24 hours.\n\n申请已发送至管理员，密码将在1-24小时内发送至您的邮箱。");
            } else if (email) {
                alert("Please enter a valid email address (e.g., name@university.edu) | 请输入有效的机构邮箱地址");
            }
        }
        
        // 额外的安全：阻止通过控制台修改（简单的debugger陷阱，可被绕过但增加难度）
        setInterval(function() {
            const gate = document.getElementById('gate');
            if (gate && gate.style.display !== 'none') {
                // 在密码门显示期间，每隔一段时间检查是否有调试器
                // 这只是心理威慑，可删除
                (function(){}).constructor('debugger')();
            }
        }, 3000);
    </script>

</body>
</html>
