        .lang-en, .lang-cn { display: none; }

        html[lang-mode="both"] .lang-en, html[lang-mode="both"] .lang-cn { 
            display: block; font-size: 0.95em; line-height: 1.5; 
        }
        html[lang-mode="both"] .lang-cn {

        .lang-switcher { display: flex; background: rgba(229, 231, 235, 0.5); border-radius: 9999px; padding: 0.25rem; gap: 0.25rem; }
        .dark .lang-switcher { background: rgba(55, 65, 81, 0.5); }
        .lang-btn { padding: 0.375rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; cursor: pointer; }

        .timeline-item { position: relative; padding-left: 2rem; padding-bottom: 2rem; border-left: 2px solid #E5E7EB; }
        .dark .timeline-item { border-left-color: #374151; }
        .timeline-item::before {
            content: ''; position: absolute; left: -5px; top: 0;
            width: 12px; height: 12px; border-radius: 50%; background: #6B7280; border: 2px solid white;
            box-shadow: 0 0 0 2px #6B7280;
        }
        .timeline-item.success::before { background: #10B981; box-shadow: 0 0 0 2px #10B981; }
        .timeline-item.conflict::before { background: #EF4444; box-shadow: 0 0 0 2px #EF4444; }
        .timeline-item:last-child { border-left: none; }
        
        .evidence-badge { 
            display: inline-block; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; 
            font-family: 'JetBrains Mono', monospace;
        }
        .evidence-smoking { background: #FEE2E2; color: #991B1B; }
        .evidence-hoop { background: #DBEAFE; color: #1E40AF; }
        .evidence-straw { background: #F3F4F6; color: #4B5563; }
        .dark .evidence-smoking { background: #7F1D1D; color: #FECACA; }
        .dark .evidence-hoop { background: #1E3A8A; color: #BFDBFE; }
        
        .comparison-table th, .comparison-table td { padding: 0.75rem; border: 1px solid #E5E7EB; }
        .dark .comparison-table th, .dark .comparison-table td { border-color: #374151; }
        .comparison-table th { background: #F9FAFB; font-weight: 600; }
        .dark .comparison-table th { background: #1F2937; }
